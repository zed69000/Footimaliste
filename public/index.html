<style>

*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 28%,#4b1d18 0%,#15171c 56%,#06070a 100%);font-family:Arial,Helvetica,sans-serif;color:var(--txt);touch-action:none;user-select:none;-webkit-user-select:none}

.cup{display:grid;place-items:center;margin:0 auto 8px;width:118px;height:118px;filter:drop-shadow(0 8px 0 rgba(0,0,0,.35))}.cup svg{width:118px;height:118px}h1{margin:0;text-align:center;font-size:clamp(40px,8vw,86px);line-height:.86;letter-spacing:-2px;text-transform:uppercase;color:#ff3838;text-shadow:0 5px 0 #4b0000}.sub{text-align:center;color:var(--muted);margin:8px 0 14px}.modeRow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}.modeBtn,.startBtn,.smallBtn{border:0;border-radius:10px;font-weight:900;color:white;background:linear-gradient(#333,#111);box-shadow:0 5px 0 #000;min-height:48px;cursor:pointer;touch-action:manipulation}.modeBtn.selected{background:linear-gradient(#ffcf40,#b77800);color:#160d00;box-shadow:0 5px 0 #5b3000}.startBtn{width:100%;margin-top:12px;background:linear-gradient(#ff4545,#a90000);box-shadow:0 6px 0 #520000;font-size:18px;height:58px}.countries{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;max-height:390px;overflow-y:auto;padding:2px;touch-action:pan-y}.country{border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:9px;background:rgba(255,255,255,.055);cursor:pointer;min-height:88px;touch-action:manipulation}.country.selected{background:rgba(255,211,74,.18);border-color:var(--gold);outline:2px solid rgba(255,211,74,.28)}.kit{width:38px;height:38px;border:2px solid #111;box-shadow:4px 5px 0 rgba(0,0,0,.28);margin-bottom:5px}.country strong{font-size:13px;display:block}.stats{font-size:10.5px;color:var(--muted);line-height:1.25}

#mobileControls{position:fixed;inset:0;z-index:12;display:none;pointer-events:none}.stickBase{position:absolute;left:24px;bottom:26px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.18);pointer-events:auto;touch-action:none}.stickNub{position:absolute;left:48px;top:48px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.55);box-shadow:0 4px 0 rgba(0,0,0,.35)}.btns{position:absolute;right:14px;bottom:22px;display:grid;grid-template-columns:repeat(2,76px);gap:14px;pointer-events:auto}.mbtn{width:76px;height:76px;border-radius:16px;border:2px solid rgba(255,255,255,.18);background:rgba(0,0,0,.68);color:white;font-size:12px;font-weight:900;display:grid;place-items:center;box-shadow:0 5px 0 rgba(0,0,0,.65);touch-action:none}.mbtn.down{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.65);background:rgba(160,0,0,.82)}

@media(max-height:520px) and (orientation:landscape){#menu{padding:8px}.panel{padding:10px}.cup{display:none}h1{font-size:36px}.sub{display:none}.modeRow{grid-template-columns:repeat(3,1fr);gap:6px}.modeBtn{min-height:38px}.countries{grid-template-columns:repeat(4,1fr);max-height:180px;overflow-y:auto}.country{min-height:62px;display:grid;grid-template-columns:30px 1fr;column-gap:6px;padding:5px}.kit{width:28px;height:28px;grid-row:1/3;margin:0}.stats{font-size:9px}.startBtn{height:46px;margin-top:8px}}

<body>

<div id="menu"><div class="panel"><div class="cup"><svg viewBox="0 0 128 128" aria-hidden="true"><path fill="#ffd34a" d="M43 13h42v14h22c-1 22-12 35-28 39-3 7-8 12-15 14v13h20v13H44V93h20V80c-7-2-12-7-15-14-16-4-27-17-28-39h22V13z"/><path fill="#ffef9a" d="M52 22h24v41c-3 5-6 8-12 10-6-2-9-5-12-10V22z"/><path fill="#b87500" d="M23 33h20v11H34c2 8 7 13 14 16l-4 8c-13-5-20-16-21-35zm62 0h20c-1 19-8 30-21 35l-4-8c7-3 12-8 14-16h-9V33z"/><rect fill="#7b3f00" x="40" y="106" width="48" height="10"/></svg></div><h1>Brutal FC</h1><p class="sub">Coupe du monde arcade, passes en une-deux, public hystérique et boutons qui cliquent enfin là où ils sont. Le progrès, cette bête rare.</p><div class="modeRow"><button class="modeBtn selected" data-mode="training">ENTRAÎNEMENT</button><button class="modeBtn" data-mode="friendly">AMICAL</button><button class="modeBtn" data-mode="campaign">CAMPAGNE</button></div><div class="countries" id="countryList"></div><button id="startBtn" class="startBtn">LANCER</button></div></div>
<script>
(()=>{'use strict';
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');ctx.imageSmoothingEnabled=false;
const W=960,H=540,TA=0,TB=1,field={x:58,y:48,w:844,h:444,goal:126};
const topUi=document.getElementById('topUi'),toast=document.getElementById('toast'),menu=document.getElementById('menu'),countryList=document.getElementById('countryList'),hudBtns=document.getElementById('hudBtns');
const startBtn=document.getElementById('startBtn'),menuBtn=document.getElementById('menuBtn'),toggleModeBtn=document.getElementById('toggleModeBtn');
const countries=[
['Argentine','#75aadb','#fff',1.03,.98,1.16,.90,1.06],['Australie','#ffcd00','#006747',1.02,1.04,.94,1.08,.94],['Belgique','#d71920','#ffd100',1.02,1.06,1.05,.98,1.02],['Brésil','#f4d03f','#159b4c',1.08,.95,1.20,.90,1.05],['Canada','#e31b23','#fff',1.09,.95,.96,1.00,.92],['Chili','#d52b1e','#0039a6',1.02,1.01,.98,1.04,.94],['Colombie','#fcd116','#003893',1.04,1.00,1.08,.96,.98],['Corée du Sud','#ffffff','#c60c30',1.12,.88,1.12,.92,1.08],['Côte d’Ivoire','#f77f00','#009e60',1.05,1.07,.96,1.05,.94],['Croatie','#ffffff','#d00000',1.00,1.02,1.10,1.02,1.06],['Danemark','#c8102e','#fff',1.02,1.02,1.04,1.04,1.05],['Égypte','#ce1126','#fff',1.01,1.00,1.04,.98,.99],['Angleterre','#fff','#c8102e',1.00,1.14,.98,1.06,1.00],['France','#245dff','#fff',1.04,1.05,1.08,1.02,1.05],['Allemagne','#f1f1f1','#111',.98,1.10,1.05,1.06,1.12],['Ghana','#fcd116','#006b3f',1.04,1.05,.96,1.08,.92],['Italie','#1e7cff','#18d060',.97,.98,1.03,1.16,1.10],['Japon','#f5f5f5','#d92335',1.13,.86,1.18,.90,1.15],['Maroc','#c1272d','#006233',1.03,.99,1.04,1.06,1.04],['Mexique','#006847','#ce1126',1.03,1.00,1.02,1.04,.98],['Pays-Bas','#ff7f00','#fff',1.04,1.05,1.05,.98,1.02],['Nigeria','#008751','#fff',1.10,1.02,.96,1.02,.94],['Portugal','#006600','#ff0000',1.03,1.08,1.08,.98,1.02],['Sénégal','#00853f','#fdef42',1.06,1.04,.98,1.08,.98],['Espagne','#aa151b','#f1bf00',.99,.96,1.22,.92,1.14],['Suisse','#d52b1e','#fff',.98,1.02,1.02,1.08,1.08],['Uruguay','#6fc6e8','#111',.99,1.05,1.02,1.12,1.04],['USA','#3c3b6e','#b22234',1.07,.98,.98,1.00,.96],['Qatar','#8a1538','#fff',.98,.94,1.00,.98,.92],['Arabie saoudite','#006c35','#fff',1.02,.92,1.04,.98,.96],['Tunisie','#e70013','#fff',1.01,.96,1.00,1.04,.98],['Pologne','#fff','#dc143c',.97,1.12,.95,1.02,.96],['Serbie','#c6363c','#0c4076',.98,1.08,.98,1.08,.96],['Équateur','#ffd100','#2b3a8f',1.06,.98,1.00,1.02,.96],['Paraguay','#d52b1e','#0038a8',.99,1.05,.96,1.10,.95],['Pérou','#fff','#d91023',1.01,.98,1.02,1.00,.98],['Ukraine','#0057b7','#ffd700',1.00,1.00,1.04,1.04,1.02],['Turquie','#e30a17','#fff',1.03,1.04,1.00,1.06,.98],['Grèce','#0d5eaf','#fff',.97,1.00,.98,1.14,1.04],['Norvège','#ba0c2f','#00205b',1.02,1.14,.96,1.02,.96],['Suède','#006aa7','#fecc00',.99,1.02,1.03,1.05,1.04],['Autriche','#ed2939','#fff',.99,1.03,1.02,1.05,1.05],['République tchèque','#d7141a','#11457e',.98,1.03,1.02,1.06,1.02],['Algérie','#006233','#fff',1.04,.98,1.07,1.02,1.00],['Mali','#14b53a','#fcd116',1.06,1.02,.96,1.08,.94],['Afrique du Sud','#007a4d','#ffb612',1.05,.96,1.00,1.00,.96],['Nouvelle-Zélande','#111','#fff',1.00,1.03,.94,1.10,.92],['Jamaïque','#009b3a','#fed100',1.11,.98,.94,1.02,.90]
].map((a,i)=>({id:i,name:a[0],color:a[1],stripe:a[2],speed:a[3],power:a[4],pass:a[5],tackle:a[6],ai:a[7]}));
let selected=13,mode='training',teamA=countries[selected],teamB=countries[3],campaignStep=0;
let players=[],ball,particles=[],confetti=[],bloodDecals=[],items=[],controlled=null,scoreA=0,scoreB=0,timer=120,gameOver=false,last=performance.now(),shake=0,toastT=0,oneTwo=null,shootHold=false,shootCharge=0;
const keys={},pressed={},released={},mobileMove={x:0,y:0},mobPressed={},mobReleased={},mobDown={};
class V{constructor(x=0,y=0){this.x=x;this.y=y}clone(){return new V(this.x,this.y)}set(x,y){this.x=x;this.y=y;return this}add(v){this.x+=v.x;this.y+=v.y;return this}sub(v){this.x-=v.x;this.y-=v.y;return this}mul(s){this.x*=s;this.y*=s;return this}len(){return Math.hypot(this.x,this.y)}norm(){const l=this.len();if(l>.0001){this.x/=l;this.y/=l}return this}static dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}}
class Player{constructor(x,y,t,role,c,i){this.pos=new V(x,y);this.spawn=new V(x,y);this.vel=new V();this.team=t;this.role=role;this.country=c;this.i=i;this.size=28;this.r=16;this.hasBall=false;this.control=false;this.stun=0;this.cd=0;this.name=names[(t*6+i)%names.length];this.face=new V(t===TA?1:-1,0);this.energy=1;this.intent='';this.dead=false;this.respawn=0}
update(){if(this.dead){this.respawn-=1/60;if(this.respawn<=0){this.dead=false;this.stun=20;this.pos=this.spawn.clone();this.vel.set(0,0);pop(this.pos.x,this.pos.y,'#ffffff',18);show(this.name+' revient');}return}if(this.cd>0)this.cd--;if(this.stun>0)this.stun--;this.energy=clamp(this.energy+.0025,.55,1);if(this.stun<=0){if(this.control)this.input();else this.ai()}if(this.vel.len()>.18)this.face=this.vel.clone().norm();this.pos.add(this.vel);this.vel.mul(.83);this.pos.x=clamp(this.pos.x,field.x+this.r,field.x+field.w-this.r);this.pos.y=clamp(this.pos.y,field.y+this.r,field.y+field.h-this.r)}
input(){const d=new V();if(keys.z||keys.arrowup)d.y-=1;if(keys.s||keys.arrowdown)d.y+=1;if(keys.q||keys.a||keys.arrowleft)d.x-=1;if(keys.d||keys.arrowright)d.x+=1;d.x+=mobileMove.x;d.y+=mobileMove.y;if(d.len()>0){d.norm().mul(0.64*this.country.speed*this.energy);this.vel.add(d)}if(actionPress('pass'))doPass(this);if(actionPress('tackle'))tackle(this);if(actionPress('switch'))switchPlayer();const down=keys.x||mobDown.shoot;if(down){shootHold=true;if(this.hasBall)shootCharge=clamp(shootCharge+1/42,0,1)}if(actionRelease('shoot')||released.x){if(this.hasBall)shoot(this,shootCharge);shootHold=false;shootCharge=0}}
ai(){const foe=controlled&&controlled.team!==this.team?controlled:null;const ownDir=this.team===TA?1:-1;let target=this.spawn.clone();const hasEnemyBall=ball.owner&&ball.owner.team!==this.team,hasOurBall=ball.owner&&ball.owner.team===this.team;const free=!ball.owner;const chaser=closestToBall(this.team);if(free&&chaser===this){target=ball.pos.clone();this.intent='récupère'}else if(hasEnemyBall){if(chaser===this&&V.dist(this.pos,ball.owner.pos)<210){target=ball.owner.pos.clone();this.intent='presse';if(V.dist(this.pos,ball.owner.pos)<34&&this.cd<=0)tackle(this)}else{const f=this.role==='keeper'?.04:this.role==='defender'?.23:this.role==='mid'?.42:.56;const gx=this.team===TA?field.x+44:field.x+field.w-44;target=new V(gx+(ball.pos.x-gx)*f,ball.pos.y+(this.i-2.5)*30);this.intent='couvre'}}else if(hasOurBall){if(ball.owner===this){this.intent='porte';aiWithBall(this)}else{const lane=(this.i-2.5)*42;const ox=this.role==='defender'?-ownDir*210:this.role==='mid'?-ownDir*60:ownDir*150;target=ball.owner.pos.clone().add(new V(ox,lane));this.intent='solution'}}else{this.intent='replace'}target.x=clamp(target.x,field.x+35,field.x+field.w-35);target.y=clamp(target.y,field.y+35,field.y+field.h-35);const to=target.sub(this.pos);if(to.len()>5)this.vel.add(to.norm().mul(.48*this.country.speed*this.country.ai*(mode==='training'?0.6:1)))}
draw(){if(this.dead)return;const x=Math.round(this.pos.x),y=Math.round(this.pos.y),s=this.size,h=s/2;ctx.save();ctx.translate(x,y);ctx.fillStyle='rgba(0,0,0,.35)';ctx.fillRect(-h+4,-h+9,s,s);ctx.fillStyle='#f0c58d';ctx.fillRect(-h,-h,s,s);ctx.fillStyle='#111';ctx.fillRect(-2,-h+4,4,10);ctx.fillStyle=this.country.color;ctx.fillRect(-h,0,s,h);ctx.fillStyle=this.country.stripe;ctx.fillRect(-h,h-6,s,6);if(this.hasBall){ctx.strokeStyle='#ffe45c';ctx.lineWidth=4;ctx.strokeRect(-h-5,-h-5,s+10,s+10);ctx.fillStyle='#ffe45c';ctx.font='900 11px Arial';ctx.textAlign='center';ctx.fillText(this.name,0,-h-12)}if(this.control){ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.strokeRect(-h-3,-h-3,s+6,s+6);ctx.beginPath();ctx.moveTo(0,-h-18);ctx.lineTo(-7,-h-8);ctx.lineTo(7,-h-8);ctx.fillStyle='#fff';ctx.fill()}if(this.stun>0){ctx.fillStyle='rgba(255,0,0,.5)';ctx.fillRect(-h,-h,s,s)}ctx.restore()}}
class Ball{constructor(){this.pos=new V(W/2,H/2);this.vel=new V();this.r=8;this.owner=null;this.lastKicker=null;this.spin=0}update(){if(this.owner){const f=this.owner.face;this.pos.set(this.owner.pos.x+f.x*21,this.owner.pos.y+f.y*21);this.vel.set(0,0);return}this.pos.add(this.vel);this.spin+=this.vel.len()*.05;this.vel.mul(.986);if(this.vel.len()<.06)this.lastKicker=null;if(this.pos.x-this.r<field.x){if(inGoal(this.pos.y)){goal(TB);return}this.pos.x=field.x+this.r;this.vel.x*=-.88;wallHit(this.pos.x,this.pos.y)}if(this.pos.x+this.r>field.x+field.w){if(inGoal(this.pos.y)){goal(TA);return}this.pos.x=field.x+field.w-this.r;this.vel.x*=-.88;wallHit(this.pos.x,this.pos.y)}if(this.pos.y-this.r<field.y){this.pos.y=field.y+this.r;this.vel.y*=-.88;wallHit(this.pos.x,this.pos.y)}if(this.pos.y+this.r>field.y+field.h){this.pos.y=field.y+field.h-this.r;this.vel.y*=-.88;wallHit(this.pos.x,this.pos.y)}const lethal=this.vel.len()>12.2;for(const p of players){if(p.dead)continue;if(V.dist(this.pos,p.pos)<this.r+p.r){if(lethal&&this.lastKicker&&this.lastKicker!==p){brutalKO(p,this.lastKicker,'FATAL SHOT !');this.vel.mul(.78);continue}else{attach(p);break}}}if(lethal){for(let i=0;i<2;i++)particles.push({x:this.pos.x+rand(-5,5),y:this.pos.y+rand(-5,5),vx:rand(-.6,.6),vy:rand(-.6,.6),life:rand(8,18),c:Math.random()>.5?'#ffdd32':'#ff3b19',s:rand(3,6)})}}draw(){ctx.save();ctx.translate(this.pos.x,this.pos.y);ctx.rotate(this.spin);ctx.fillStyle='#f8f8ef';ctx.beginPath();ctx.arc(0,0,this.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#111';ctx.fillRect(-2,-7,4,4);ctx.fillRect(3,-1,4,4);ctx.restore()}}
const names=['Nico','Léo','Max','Sam','Ilan','Tom','Alex','Jules','Noa','Yan','Milo','Enzo'];
function buildMenu(){countryList.innerHTML='';countries.forEach((c,i)=>{const e=document.createElement('div');e.className='country'+(i===selected?' selected':'');e.innerHTML=`<div class="kit" style="background:linear-gradient(to bottom,#f0c58d 32%,${c.color} 32%,${c.color} 78%,${c.stripe} 78%)"></div><strong>${c.name}</strong><div class="stats">Vit ${stars(c.speed)} · Tir ${stars(c.power)}<br>Passe ${stars(c.pass)} · Tacle ${stars(c.tackle)}</div>`;e.addEventListener('pointerup',ev=>{ev.preventDefault();selected=i;teamA=countries[i];buildMenu()});countryList.appendChild(e)})}
function stars(v){return v>1.12?'★★★':v>1.02?'★★☆':v>.96?'★☆☆':'·☆☆'}
document.querySelectorAll('.modeBtn').forEach(b=>b.addEventListener('pointerup',e=>{e.preventDefault();mode=b.dataset.mode;document.querySelectorAll('.modeBtn').forEach(x=>x.classList.toggle('selected',x===b));startBtn.textContent=mode==='training'?'LANCER L’ENTRAÎNEMENT':mode==='friendly'?'LANCER AMICAL':'LANCER CAMPAGNE'}));
startBtn.addEventListener('pointerup',e=>{e.preventDefault();startGame(mode)});menuBtn.onclick=()=>{menu.style.display='block';hudBtns.style.display='none'};toggleModeBtn.onclick=()=>startGame(mode==='training'?'friendly':'training');
function startGame(m){mode=m;menu.style.display='none';hudBtns.style.display='flex';toggleModeBtn.textContent=mode==='training'?'MATCH IA':'TUTO';teamA=countries[selected];teamB=mode==='campaign'?countries[(selected+1+campaignStep)%countries.length]:countries[(selected+7)%countries.length];scoreA=0;scoreB=0;timer=mode==='training'?999:120;gameOver=false;reset(TA);show(mode==='training'?'ENTRAÎNEMENT LIBRE':mode==='campaign'?'MATCH DE CAMPAGNE':'MATCH AMICAL')}
function createTeams(){players=[];const a=[['keeper',120,H/2],['defender',250,H/2-82],['defender',250,H/2+82],['mid',390,H/2],['striker',530,H/2-68],['striker',530,H/2+68]],b=[['keeper',W-120,H/2],['defender',W-250,H/2-82],['defender',W-250,H/2+82],['mid',W-390,H/2],['striker',W-530,H/2-68],['striker',W-530,H/2+68]];a.forEach((s,i)=>players.push(new Player(s[1],s[2],TA,s[0],teamA,i)));if(mode!=='training')b.forEach((s,i)=>players.push(new Player(s[1],s[2],TB,s[0],teamB,i)));setControl(players[3])}
function reset(kick){createTeams();ball=new Ball();const starter=players.find(p=>p.team===kick&&p.role==='mid')||players[3];attach(starter);particles=[];confetti=[];bloodDecals=[];oneTwo=null;shootCharge=0}
function attach(p){if(!p||p.dead)return;if(ball.owner)ball.owner.hasBall=false;ball.owner=p;p.hasBall=true;if(p.team===TA)setControl(p)}
function release(dir,pow){if(ball.owner){ball.lastKicker=ball.owner;ball.owner.hasBall=false;}ball.owner=null;ball.vel=dir.norm().mul(pow)}
function doPass(p){if(!p.hasBall)return;if(oneTwo&&oneTwo.returnTo&&oneTwo.from===p&&V.dist(p.pos,oneTwo.returnTo.pos)<260){targetPass(p,oneTwo.returnTo,true);oneTwo=null;return}const mate=bestMate(p);if(!mate)return;oneTwo={from:mate,returnTo:p,t:1.8};targetPass(p,mate,false);setControl(mate)}
function targetPass(p,mate,ret){const lead=mate.vel.clone().mul(11);const dir=mate.pos.clone().add(lead).sub(p.pos);release(dir,8.2*p.country.pass);pop(p.pos.x,p.pos.y,'#ffe45c',8);if(ret)setControl(mate)}
function bestMate(p){const mates=players.filter(m=>m.team===p.team&&m!==p&&!m.dead);let best=null,score=-1e9;for(const m of mates){const to=m.pos.clone().sub(p.pos),d=to.len(),dir=to.clone().norm();let s=(dir.x*p.face.x+dir.y*p.face.y)*80-d*.12;if(m.role==='striker')s+=14;if(laneBlocked(p.pos,m.pos,p.team))s-=100;if(s>score){score=s;best=m}}return best}
function shoot(p,charge){if(!p.hasBall)return;const gx=p.team===TA?field.x+field.w:field.x,gy=H/2+rand(-field.goal*.32,field.goal*.32);const pow=(9.5+charge*7.8)*p.country.power;release(new V(gx,gy).sub(p.pos),pow);pop(p.pos.x,p.pos.y,charge>.75?'#ff2600':'#ff4a24',14+charge*24);if(charge>.75)show('TIR CARNAGE !');shake+=4+charge*8}
function tackle(p){if(p.cd>0)return;p.cd=mode==='training'?18:34;const dir=p.face.clone();if(p.hasBall){p.vel.add(dir.mul(7.2*p.country.tackle));pop(p.pos.x,p.pos.y,'#53d7ff',10);return}p.vel.add(dir.mul(6.3*p.country.tackle));for(const o of players){if(o.dead||o.team===p.team)continue;if(V.dist(o.pos,p.pos)<38){o.stun=24;gore(o.pos.x,o.pos.y,18);shake+=7;if(o.hasBall){o.hasBall=false;ball.owner=null;ball.lastKicker=p;ball.vel=p.face.clone().mul(8.6);show('TACLE SANGLANT !')}else if(Math.random()<.18){brutalKO(o,p,'TACLE MEURTRIER !')}}}}
function aiWithBall(p){const gx=p.team===TA?field.x+field.w:field.x;if(Math.random()<.02){const m=bestMate(p);if(m&&Math.random()<.7)targetPass(p,m,false)}if(Math.abs(p.pos.x-gx)<255&&Math.abs(p.pos.y-H/2)<145&&Math.random()<.045)shoot(p,.35);else p.vel.add(new V(p.team===TA?1:-1,(H/2-p.pos.y)*.002).mul(.38))}
function closestToBall(team){let b=null,d=1e9;for(const p of players){if(p.dead||p.team!==team||p.role==='keeper')continue;const dd=V.dist(p.pos,ball.owner?ball.owner.pos:ball.pos);if(dd<d){d=dd;b=p}}return b}
function switchPlayer(){const list=players.filter(p=>p.team===TA&&!p.dead);let b=null,d=1e9;for(const p of list){if(p===controlled)continue;const dd=V.dist(p.pos,ball.pos);if(dd<d){d=dd;b=p}}if(b)setControl(b)}function setControl(p){players.forEach(x=>x.control=false);controlled=p;p.control=true}
function laneBlocked(a,b,team){for(const p of players){if(p.dead||p.team===team)continue;if(distSeg(p.pos,a,b)<20)return true}return false}function distSeg(p,a,b){const ab=b.clone().sub(a),ap=p.clone().sub(a),l=ab.x*ab.x+ab.y*ab.y;let t=l?(ap.x*ab.x+ap.y*ab.y)/l:0;t=clamp(t,0,1);return V.dist(p,new V(a.x+ab.x*t,a.y+ab.y*t))}
function goal(team){team===TA?scoreA++:scoreB++;confettiBurst();show(team===TA?'BUUUUT ! PUBLIC EN FOLIE':'BUT ENCAISSÉ');shake=18;reset(team===TA?TB:TA);if(mode==='campaign'&&scoreA>=3){campaignStep++;show('VICTOIRE DE CAMPAGNE !')}}function inGoal(y){return Math.abs(y-H/2)<field.goal/2}
function update(dt){if(menu.style.display!=='none'){clearInput();return}if(pressed.r)startGame(mode);timer-=dt;if(timer<=0&&mode!=='training'){timer=0;gameOver=true}if(oneTwo){oneTwo.t-=dt;if(oneTwo.t<=0)oneTwo=null}players.forEach(p=>p.update());ball.update();particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.life--});particles=particles.filter(p=>p.life>0);confetti.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.vy+=.05;c.life--});confetti=confetti.filter(c=>c.life>0);if(toastT>0){toastT-=dt;if(toastT<=0)toast.style.opacity=0}clearInput()}
function draw(){ctx.save();if(shake>0){ctx.translate(rand(-shake,shake),rand(-shake,shake));shake*=.86;if(shake<.4)shake=0}fieldDraw();drawBlood();drawPassGuide();players.slice().sort((a,b)=>a.pos.y-b.pos.y).forEach(p=>p.draw());ball.draw();drawCharge();drawParticles();ctx.restore();drawConfetti();topUi.innerHTML=`${teamA.name} <span style="color:#ffd34a">${scoreA}</span> - <span style="color:#ffd34a">${scoreB}</span> ${mode==='training'?'TUTO':teamB.name} · ⏱ ${Math.ceil(timer)}`;if(gameOver)gameOverDraw()}
function fieldDraw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#133925';ctx.fillRect(0,0,W,H);for(let i=0;i<12;i++){ctx.fillStyle=i%2?'#1e6d40':'#19713f';ctx.fillRect(field.x+i*field.w/12,field.y,field.w/12,field.h)}ctx.strokeStyle='rgba(255,255,255,.55)';ctx.lineWidth=3;ctx.strokeRect(field.x,field.y,field.w,field.h);ctx.beginPath();ctx.moveTo(W/2,field.y);ctx.lineTo(W/2,field.y+field.h);ctx.stroke();ctx.beginPath();ctx.arc(W/2,H/2,62,0,Math.PI*2);ctx.stroke();ctx.strokeRect(field.x,H/2-95,96,190);ctx.strokeRect(field.x+field.w-96,H/2-95,96,190);ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(field.x-18,H/2-field.goal/2,18,field.goal);ctx.fillRect(field.x+field.w,H/2-field.goal/2,18,field.goal)}
function drawBlood(){bloodDecals.forEach(b=>{ctx.globalAlpha=b.a;ctx.fillStyle=b.c;ctx.fillRect(b.x-b.s/2,b.y-b.s/2,b.s,b.s)});ctx.globalAlpha=1}
function gore(x,y,n){for(let i=0;i<n;i++){const vx=rand(-7,7),vy=rand(-7,7),c=Math.random()>.35?'#c40000':'#700000';particles.push({x,y,vx,vy,life:rand(18,42),c,s:rand(3,8)});bloodDecals.push({x:clamp(x+vx*5,field.x,field.x+field.w),y:clamp(y+vy*5,field.y,field.y+field.h),s:rand(5,16),c,a:rand(.55,.95)})}}
function brutalKO(victim,killer,msg){victim.dead=true;victim.respawn=mode==='training'?1.1:2.2;victim.hasBall=false;if(ball.owner===victim)ball.owner=null;gore(victim.pos.x,victim.pos.y,52);pop(victim.pos.x,victim.pos.y,'#ffdf2e',22);shake+=18;show(msg+' '+victim.name);if(victim===controlled)switchPlayer()}
function wallHit(x,y){pop(x,y,'#ffffff',7);if(ball.vel.len()>12)pop(x,y,'#ff3b19',10);shake+=2}
function drawPassGuide(){if(!controlled||!controlled.hasBall)return;const m=oneTwo&&oneTwo.returnTo?oneTwo.returnTo:bestMate(controlled);if(!m)return;ctx.save();ctx.setLineDash([6,8]);ctx.strokeStyle=oneTwo?'#53d7ff':'rgba(255,255,255,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(controlled.pos.x,controlled.pos.y);ctx.lineTo(m.pos.x,m.pos.y);ctx.stroke();ctx.restore()}
function drawCharge(){if(!controlled||!controlled.hasBall||shootCharge<=0)return;const x=controlled.pos.x-24,y=controlled.pos.y-34;ctx.fillStyle='rgba(0,0,0,.55)';ctx.fillRect(x,y,48,7);ctx.fillStyle=shootCharge>.75?'#ff3333':'#ffd34a';ctx.fillRect(x,y,48*shootCharge,7)}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=clamp(p.life/30,0,1);ctx.fillStyle=p.c;ctx.fillRect(p.x,p.y,p.s,p.s)});ctx.globalAlpha=1}
function drawConfetti(){confetti.forEach(c=>{ctx.fillStyle=c.c;ctx.fillRect(c.x,c.y,c.s,c.s)})}
function gameOverDraw(){ctx.fillStyle='rgba(0,0,0,.82)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#ffd34a';ctx.font='900 58px Arial';ctx.fillText(scoreA>scoreB?'VICTOIRE !':'MATCH TERMINÉ',W/2,H/2-30);ctx.fillStyle='#fff';ctx.font='900 30px Arial';ctx.fillText(`${scoreA} - ${scoreB}`,W/2,H/2+18)}
function pop(x,y,c,n){for(let i=0;i<n;i++)particles.push({x,y,vx:rand(-3,3),vy:rand(-3,3),life:rand(12,28),c,s:rand(2,5)})}function confettiBurst(){const colors=['#ffd34a','#ff3333','#53d7ff','#ffffff','#35e86b'];for(let i=0;i<160;i++)confetti.push({x:rand(0,W),y:rand(-40,80),vx:rand(-1.5,1.5),vy:rand(1,4),life:rand(80,150),s:rand(3,7),c:colors[i%colors.length]})}
function show(t){toast.textContent=t;toast.style.opacity=1;toastT=1.7}
function loop(now){const dt=Math.min((now-last)/1000,.033);last=now;update(dt);draw();requestAnimationFrame(loop)}
function actionPress(a){return pressed[actionKey(a)]||mobPressed[a]}function actionRelease(a){return released[actionKey(a)]||mobReleased[a]}function actionKey(a){return {pass:' ',tackle:'c',switch:'tab',shoot:'x'}[a]}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(!keys[k])pressed[k]=true;keys[k]=true;if(k==='tab')e.preventDefault()});addEventListener('keyup',e=>{const k=e.key.toLowerCase();keys[k]=false;released[k]=true});
function clearInput(){for(const k in pressed)delete pressed[k];for(const k in released)delete released[k];for(const k in mobPressed)delete mobPressed[k];for(const k in mobReleased)delete mobReleased[k]}
const stick=document.getElementById('stick'),nub=document.getElementById('nub');let sid=null,origin=null;stick.addEventListener('pointerdown',e=>{e.preventDefault();sid=e.pointerId;stick.setPointerCapture(sid);const r=stick.getBoundingClientRect();origin={x:e.clientX,y:e.clientY,left:r.left,top:r.top};stick.style.left=(e.clientX-r.width/2)+'px';stick.style.top=(e.clientY-r.height/2)+'px';stick.style.bottom='auto';stickMove(e)});stick.addEventListener('pointermove',e=>{if(e.pointerId===sid)stickMove(e)});stick.addEventListener('pointerup',stickEnd);stick.addEventListener('pointercancel',stickEnd);function stickMove(e){const max=44;let dx=e.clientX-origin.x,dy=(e.clientY-origin.y)*.82;const l=Math.hypot(dx,dy);if(l<12){mobileMove.x=0;mobileMove.y=0;dx=0;dy=0}else{const cl=Math.min(l,max);const power=(cl/max)**1.35;mobileMove.x=(dx/l)*power;mobileMove.y=(dy/l)*power;if(l>max){dx=dx/l*max;dy=dy/l*max}}nub.style.transform=`translate(${dx}px,${dy}px)`}function stickEnd(e){sid=null;mobileMove.x=0;mobileMove.y=0;nub.style.transform='translate(0,0)';stick.style.left='';stick.style.top='';stick.style.bottom=''}
document.querySelectorAll('.mbtn').forEach(b=>{const a=b.dataset.action;b.addEventListener('pointerdown',e=>{e.preventDefault();b.setPointerCapture(e.pointerId);mobPressed[a]=true;mobDown[a]=true;b.classList.add('down')});b.addEventListener('pointerup',e=>{e.preventDefault();mobReleased[a]=true;mobDown[a]=false;b.classList.remove('down')});b.addEventListener('pointercancel',()=>{mobReleased[a]=true;mobDown[a]=false;b.classList.remove('down')})});
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function rand(a,b){return a+Math.random()*(b-a)}
buildMenu();ball=new Ball();requestAnimationFrame(loop);
})();
</script>
